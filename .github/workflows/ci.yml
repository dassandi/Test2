name: Basic CI Pipeline

on:
  push:
    branches:
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Show files
        run: ls -la

      - name: Run simple test
        run: |
          echo "Running CI test..."
          cat test.txt